services:
  - type: web
    name: chatapp-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: chatapp-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: chatapp-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: chatapp-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: chatapp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: chatapp-db
          property: password
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: chatapp-db
    plan: free
    databaseName: chatapp
